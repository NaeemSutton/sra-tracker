<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — SRA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#00d4aa;--text:#e6edf3;--muted:#7d8590;--error:#ff4444;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{background:var(--surface);border:1px solid var(--border);padding:40px;width:100%;max-width:420px;}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:600;color:var(--accent);margin-bottom:8px;}
  .logo span{color:var(--muted);}
  .subtitle{font-size:0.82rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:32px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
  .analyst-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
  .analyst-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;font-family:'IBM Plex Sans',sans-serif;font-size:0.875rem;cursor:pointer;transition:all .15s;text-align:center;}
  .analyst-btn:hover{border-color:var(--accent);color:var(--accent);}
  .divider{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .divider-line{flex:1;height:1px;background:var(--border);}
  .divider-text{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);}
  .manager-section{border:1px solid var(--border);padding:16px;}
  .manager-label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
  .input-row{display:flex;gap:8px;}
  .pw-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:0.82rem;}
  .pw-input:focus{outline:none;border-color:var(--accent);}
  .pw-input::placeholder{color:var(--muted);}
  .manager-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:9px 16px;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .manager-btn:hover{background:var(--accent);color:#0d1117;}
  .error{color:var(--error);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SRA<span>//</span>TRACKER</div>
  <div class="subtitle">UMass Memorial Health · Risk Team</div>

  <div class="section-label">Sign in as analyst</div>
  <div class="analyst-grid">
    {% for analyst in analysts %}
    <form method="POST">
      <input type="hidden" name="choice" value="{{ analyst }}">
      <button type="submit" class="analyst-btn">{{ analyst }}</button>
    </form>
    {% endfor %}
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>

  <div class="manager-section">
    <div class="manager-label">Manager Access</div>
    <form method="POST">
      <input type="hidden" name="choice" value="manager">
      <div class="input-row">
        <input type="password" name="password" class="pw-input" placeholder="Enter manager password">
        <button type="submit" class="manager-btn">Enter →</button>
      </div>
    </form>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </div>
</div>
</body>
</html>
